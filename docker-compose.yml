version: "3.9"

services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.port=8333 -master.volumeSizeLimitMB=100
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9333/cluster/status"]
      interval: 10s
      retries: 5

  mysql:
    image: mysql:8.0
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: emulator_root
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pemulator_root"]
      interval: 10s
      retries: 10

  airflow:
    build:
      context: .
      dockerfile: DockerfileAirflow
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: pipeline_emulator_secret
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow boto3 pymysql sqlalchemy"
      CHUNKING_API_URL: http://mock-api:8000/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich
      SEAWEEDFS_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_ACCESS_KEY: any
      SEAWEEDFS_SECRET_KEY: any
      MYSQL_HOST: mysql
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pii_engine:/opt/airflow/pii_engine
      - airflow-logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
    command: ["bash", "-c", "airflow standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      retries: 10
      start_period: 60s

  mock-api:
    build:
      context: ./mock_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CHUNKING_API_URL: http://mock-api:8000/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  ui-backend:
    build:
      context: ./ui-backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
      MYSQL_DATABASE: pipeline_emulator
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # CDC 스택 (profiles: [cdc] — 기본 기동 시 비활성)
  # 기동: COMPOSE_PROFILES=cdc docker compose up
  # ─────────────────────────────────────────

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      retries: 5
    profiles:
      - cdc

  debezium:
    image: debezium/server:2.7
    volumes:
      - ./debezium/conf:/debezium/conf
    environment:
      DEBEZIUM_SINK_TYPE: redis
      DEBEZIUM_SINK_REDIS_ADDRESS: valkey:6379
      DEBEZIUM_SOURCE_CONNECTOR_CLASS: io.debezium.connector.mysql.MySqlConnector
      DEBEZIUM_SOURCE_DATABASE_HOSTNAME: mysql
      DEBEZIUM_SOURCE_DATABASE_PORT: "3306"
      DEBEZIUM_SOURCE_DATABASE_USER: debezium
      DEBEZIUM_SOURCE_DATABASE_PASSWORD: debezium_pass
      DEBEZIUM_SOURCE_DATABASE_SERVER_ID: "1"
      DEBEZIUM_SOURCE_TOPIC_PREFIX: pipeline
      DEBEZIUM_SOURCE_DATABASE_INCLUDE_LIST: pipeline_emulator
      DEBEZIUM_SOURCE_SCHEMA_HISTORY_INTERNAL: io.debezium.storage.redis.history.RedisSchemaHistory
      DEBEZIUM_SOURCE_SCHEMA_HISTORY_INTERNAL_REDIS_ADDRESS: valkey:6379
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
    profiles:
      - cdc

volumes:
  seaweedfs-data:
  mysql-data:
  airflow-logs:

# frontend: dev-serve 방식으로 실행. npm run dev (PUBLIC_UI_BACKEND_URL=http://localhost:8001)
