version: "3.9"

services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.port=8333 -master.volumeSizeLimitMB=100
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9333/cluster/status"]
      interval: 10s
      retries: 5

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: emulator_root
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pemulator_root"]
      interval: 10s
      retries: 10

  airflow:
    image: apache/airflow:2.9.0-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://emulator:emulator_pass@mysql/pipeline_emulator_airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: pipeline_emulator_secret
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow boto3 pymysql sqlalchemy"
      CHUNKING_API_URL: http://mock-api:8000/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich
      SEAWEEDFS_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_ACCESS_KEY: any
      SEAWEEDFS_SECRET_KEY: any
      MYSQL_HOST: mysql
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pii_engine:/opt/airflow/pii_engine
      - airflow-logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
    command: ["bash", "-c", "pip install -q pymysql pyarrow boto3 sqlalchemy && airflow standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      retries: 10
      start_period: 60s

  mock-api:
    build:
      context: ./mock_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CHUNKING_API_URL: http://mock-api:8000/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

volumes:
  seaweedfs-data:
  mysql-data:
  airflow-logs:
