version: "3.9"

services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.port=8333 -master.volumeSizeLimitMB=100
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9333/cluster/status"]
      interval: 10s
      retries: 5

  mysql:
    image: mysql:8.0
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: emulator_root
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pemulator_root"]
      interval: 10s
      retries: 10

  airflow:
    build:
      context: .
      dockerfile: DockerfileAirflow
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR:-SequentialExecutor}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_SQL_CONN:-sqlite:////opt/airflow/airflow.db}
      AIRFLOW__WEBSERVER__SECRET_KEY: pipeline_emulator_secret
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow boto3 pymysql sqlalchemy presidio-analyzer presidio-anonymizer spacy elasticsearch celery[redis]"
      AIRFLOW__CELERY__BROKER_URL: ${CELERY_BROKER_URL:-}
      AIRFLOW__CELERY__RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
      # MASK=presidio  # 주석 처리 상태로 추가 — 데모 시에만 활성화 (.env에서 오버라이드)
      # ENRICH=real 전환 시 아래 두 값을 실제 엔드포인트 URL로 교체
      CHUNKING_API_URL: http://mock-api:8000/chunk  # real: https://your-chunking-api.example.com/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich   # real: https://your-enrich-api.example.com/enrich
      SEAWEEDFS_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_ACCESS_KEY: any
      SEAWEEDFS_SECRET_KEY: any
      MYSQL_HOST: mysql
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pii_engine:/opt/airflow/pii_engine
      - airflow-logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: ["bash", "-c", "airflow db migrate && (airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com 2>/dev/null || true) && (airflow scheduler &) && exec airflow webserver"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      retries: 10
      start_period: 60s

  mock-api:
    build:
      context: ./mock_api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CHUNKING_API_URL: http://mock-api:8000/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  ui-backend:
    build:
      context: ./ui-backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
      MYSQL_DATABASE: pipeline_emulator
      ES_HOST: elasticsearch
      ES_PORT: "9200"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Celery 스택 (profiles: [celery] — 기본 기동 시 비활성)
  # 기동: AIRFLOW_EXECUTOR=CeleryExecutor AIRFLOW_SQL_CONN=mysql+pymysql://emulator:emulator_pass@mysql:3306/pipeline_emulator \
  #       CELERY_BROKER_URL=redis://valkey:6379/1 CELERY_RESULT_BACKEND=db+mysql+pymysql://emulator:emulator_pass@mysql:3306/pipeline_emulator \
  #       COMPOSE_PROFILES=celery docker compose up -d
  # ─────────────────────────────────────────

  airflow-worker:
    image: pipeline-emulator-airflow:latest
    command: ["bash", "-c", "airflow celery worker"]
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR:-CeleryExecutor}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_SQL_CONN:-mysql+pymysql://emulator:emulator_pass@mysql:3306/pipeline_emulator}
      AIRFLOW__WEBSERVER__SECRET_KEY: pipeline_emulator_secret
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_DB_MIGRATE: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "pyarrow boto3 pymysql sqlalchemy presidio-analyzer presidio-anonymizer spacy elasticsearch celery[redis]"
      CHUNKING_API_URL: http://mock-api:8000/chunk
      ENRICH_API_URL: http://mock-api:8000/enrich
      SEAWEEDFS_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_ACCESS_KEY: any
      SEAWEEDFS_SECRET_KEY: any
      MYSQL_HOST: mysql
      MYSQL_DATABASE: pipeline_emulator
      MYSQL_USER: emulator
      MYSQL_PASSWORD: emulator_pass
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      AIRFLOW__CELERY__BROKER_URL: ${CELERY_BROKER_URL:-redis://valkey:6379/1}
      AIRFLOW__CELERY__RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-db+mysql+pymysql://emulator:emulator_pass@mysql:3306/pipeline_emulator}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pii_engine:/opt/airflow/pii_engine
      - airflow-logs:/opt/airflow/logs
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
    profiles:
      - celery

  # ─────────────────────────────────────────
  # CDC 스택 (profiles: [cdc] — 기본 기동 시 비활성)
  # 기동: COMPOSE_PROFILES=cdc docker compose up
  # ─────────────────────────────────────────

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      retries: 5
    profiles:
      - cdc
      - celery

  debezium:
    image: debezium/server:2.7.3.Final
    volumes:
      - ./debezium/conf:/debezium/conf
    environment:
      DEBEZIUM_SINK_TYPE: redis
      DEBEZIUM_SINK_REDIS_ADDRESS: valkey:6379
      DEBEZIUM_SOURCE_CONNECTOR_CLASS: io.debezium.connector.mysql.MySqlConnector
      DEBEZIUM_SOURCE_DATABASE_HOSTNAME: mysql
      DEBEZIUM_SOURCE_DATABASE_PORT: "3306"
      DEBEZIUM_SOURCE_DATABASE_USER: debezium
      DEBEZIUM_SOURCE_DATABASE_PASSWORD: debezium_pass
      DEBEZIUM_SOURCE_DATABASE_SERVER_ID: "1"
      DEBEZIUM_SOURCE_TOPIC_PREFIX: pipeline
      DEBEZIUM_SOURCE_DATABASE_INCLUDE_LIST: pipeline_emulator
      DEBEZIUM_SOURCE_SCHEMA_HISTORY_INTERNAL: io.debezium.storage.redis.history.RedisSchemaHistory
      DEBEZIUM_SOURCE_SCHEMA_HISTORY_INTERNAL_REDIS_ADDRESS: valkey:6379
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
    profiles:
      - cdc

  # ─────────────────────────────────────────
  # NiFi 스택 (profiles: [nifi] — 기본 기동 시 비활성)
  # 기동: COMPOSE_PROFILES=nifi docker compose up
  # ─────────────────────────────────────────

  zookeeper:
    image: zookeeper:3.9.4
    environment:
      ZOO_MY_ID: 1
      ZOO_PORT: 2181
    volumes:
      - zookeeper-data:/data
      - zookeeper-log:/datalog
    profiles:
      - nifi

  nifi:
    image: apache/nifi:2.0.0
    environment:
      NIFI_WEB_HTTP_PORT: 8443
      NIFI_CLUSTER_IS_NODE: "false"
      NIFI_ZK_CONNECT_STRING: zookeeper:2181
      NIFI_ELECTION_MAX_WAIT: 30 sec
      # 싱글노드 독립 실행
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin
    ports:
      - "8443:8443"
    volumes:
      - nifi-conf:/opt/nifi/nifi-current/conf
      - ./nifi/flows:/opt/nifi/nifi-current/conf/flow_storage
      - nifi-content:/opt/nifi/nifi-current/content_repository
      - nifi-provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi-logs:/opt/nifi/nifi-current/logs
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/nifi-api/controller/config", "--insecure"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    profiles:
      - nifi

volumes:
  seaweedfs-data:
  mysql-data:
  airflow-logs:
  elasticsearch-data:
  zookeeper-data:
  zookeeper-log:
  nifi-conf:
  nifi-content:
  nifi-provenance:
  nifi-logs:

# frontend: dev-serve 방식으로 실행. npm run dev (PUBLIC_UI_BACKEND_URL=http://localhost:8001)
