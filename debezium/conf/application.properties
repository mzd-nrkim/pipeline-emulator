# Debezium Server 설정 — MySQL → Valkey(Redis) Stream
# 이 파일은 docker-compose.yml에서 /debezium/conf 로 볼륨 마운트된다.
# 환경변수(DEBEZIUM_*)가 이 파일 값을 오버라이드할 수 있다.

# ── Sink: Redis Stream (Valkey) ─────────────────────────────
debezium.sink.type=redis
debezium.sink.redis.address=valkey:6379
# 각 테이블 이벤트를 Redis Stream 키로 발행
# 키 패턴: pipeline.pipeline_emulator.<table_name>
# 예: pipeline.pipeline_emulator.bronze_document_hub

# ── Source: MySQL Connector ─────────────────────────────────
debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector
debezium.source.database.hostname=mysql
debezium.source.database.port=3306
debezium.source.database.user=debezium
debezium.source.database.password=debezium_pass
debezium.source.database.server.id=1
debezium.source.topic.prefix=pipeline
debezium.source.database.include.list=pipeline_emulator
debezium.source.table.include.list=pipeline_emulator.bronze_document_hub,pipeline_emulator.bronze_rdb_events,pipeline_emulator.bronze_document_rdb_link,pipeline_emulator.bronze_document_assembly_sat,pipeline_emulator.silver_structured_documents,pipeline_emulator.silver_masked_documents,pipeline_emulator.gold_chunked_documents,pipeline_emulator.gold_enriched_documents,pipeline_emulator.gold_staged_documents,pipeline_emulator.source_cft_problem_history

# ── Schema History: Redis ────────────────────────────────────
debezium.source.schema.history.internal=io.debezium.storage.redis.history.RedisSchemaHistory
debezium.source.schema.history.internal.redis.address=valkey:6379

# ── Offset Storage: Redis ────────────────────────────────────
debezium.source.offset.storage=io.debezium.storage.redis.offset.RedisOffsetBackingStore
debezium.source.offset.storage.redis.address=valkey:6379

# ── Snapshot 모드 ────────────────────────────────────────────
# initial: 첫 기동 시 스냅샷 수행 후 이후 binlog 스트리밍
debezium.source.snapshot.mode=initial
